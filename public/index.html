<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>EVM Arb Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6">
    <div id="login" class="max-w-sm mx-auto mt-20 p-8 bg-zinc-900 rounded-xl border border-zinc-800 text-center">
        <h2 class="text-xl font-bold mb-4">ADMIN ACCESS</h2>
        <input id="u" type="text" placeholder="User" class="w-full bg-black p-2 mb-2 border border-zinc-700">
        <input id="p" type="password" placeholder="Pass" class="w-full bg-black p-2 mb-4 border border-zinc-700">
        <button onclick="auth()" class="w-full bg-blue-600 py-2 rounded font-bold">UNLOCK</button>
    </div>

    <div id="dash" class="hidden max-w-4xl mx-auto">
        <h1 class="text-2xl font-black text-blue-500 mb-8">RANKED ARBITRAGE</h1>
        <div id="results" class="space-y-4"></div>
    </div>

    <script>
        function auth() {
            if(document.getElementById('u').value === 'samproeth' && document.getElementById('p').value === 'samproeth') {
                document.getElementById('login').style.display = 'none';
                document.getElementById('dash').style.display = 'block';
                load();
            } else { alert("Wrong login"); }
        }
        async function load() {
            const res = await fetch('/api/arbitrage');
            const data = await res.json();
            document.getElementById('results').innerHTML = data.map((item, i) => 
                <div class="p-5 bg-zinc-900 rounded-xl border ${i===0?'border-yellow-500':'border-zinc-800'} flex justify-between">
                    <div>
                        <p class="text-xs text-zinc-500">RANK #${i+1}</p>
                        <h3 class="text-xl font-bold">${item.symbol}</h3>
                        <p class="text-[10px] font-mono text-zinc-600">${item.ca}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-emerald-400 font-black text-xl">${item.spread}%</p>
                        <a href="${item.buy.link}" target="_blank" class="text-[10px] bg-white text-black px-2 py-1 rounded font-bold">TRADE</a>
                    </div>
                </div>
            ).join('');
        }
    </script>
</body>
</html>
